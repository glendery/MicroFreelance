{% extends 'marketplace/base.html' %}

{% block title %}Login ke MicroFreelance{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg p-4 rounded-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Selamat Datang Kembali!</h3>
                    <p class="text-muted small">Login untuk melanjutkan ke dashboard Anda</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_username" class="form-label small fw-bold">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control rounded-pill px-3 py-2 border-0 bg-light shadow-sm" placeholder="Masukkan username Anda" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control rounded-pill px-3 py-2 border-0 bg-light shadow-sm" placeholder="Masukkan password Anda" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-4 fw-bold">Login Sekarang</button>
                </form>
                
                <div class="mt-4 text-center">
                    <p class="text-muted small">Belum punya akun? <a href="{% url 'register' %}" class="text-primary fw-bold">Daftar sekarang!</a></p>
                    <a href="#" class="text-muted smaller">Lupa password?</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
